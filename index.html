<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BVFS - Terminal</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div id="app">
        <aside id="sidebar">
            <div class="panel-header">BVFS Mounts</div>
            <div id="mounts-list">
                <div>[OPFS] /</div>
                <div>[VDEV] /dev</div>
            </div>
        </aside>
        <main id="terminal">
            <div id="output"></div>
            <div id="input-line">
                <span id="prompt"></span>
                <input type="text" id="cmd-input" autocomplete="off" spellcheck="false" autofocus>
            </div>
        </main>
    </div>
    <script type="module" src="./modules/shell.js"></script>
</body>
</html>
